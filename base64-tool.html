<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编解码</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 600;
    color: #f0f0f0;
    letter-spacing: 0.02em;
  }

  .back-link { display: inline-block; color: #7a7a9a; text-decoration: none; font-size: 12px; margin-bottom: 4px; transition: color 0.15s; }
  .back-link:hover { color: #e0e0e0; }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  textarea {
    width: 100%;
    height: 180px;
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    color: #e0e0e0;
    font: inherit;
    font-size: 0.875rem;
    line-height: 1.6;
    padding: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: #4a6fa5; }
  textarea::placeholder { color: #555; }

  .toolbar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .btn {
    background: #2a2a4a;
    border: 1px solid #3a3a5a;
    color: #ccc;
    padding: 0.45rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.15s, color 0.15s;
  }

  .btn:hover { background: #3a3a5a; color: #fff; }
  .btn.active { background: #3a6b5e; border-color: #4a8b7a; color: #fff; }

  .copy-btn.copied { background: #2d5a27; border-color: #3a7a32; color: #8f8; }

  .error {
    background: #3a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: 6px;
    padding: 0.75rem 1rem;
    color: #ff8888;
    font-size: 0.8rem;
    white-space: pre-wrap;
  }

  .error:empty { display: none; }

  .stat { font-size: 0.7rem; color: #888; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← 返回首页</a>
  <h1>Base64 编解码</h1>

  <div class="panel">
    <label>原始文本 — UTF-8</label>
    <textarea id="raw" placeholder="输入要编码的文本，或粘贴 Base64 字符串进行解码…"></textarea>
  </div>

  <div class="toolbar">
    <button class="btn active" id="encodeBtn">编码 ↓</button>
    <button class="btn" id="decodeBtn">解码 ↑</button>
    <button class="btn copy-btn" id="copyBtn">Copy</button>
    <span class="stat" id="stat"></span>
  </div>

  <div class="panel">
    <label>结果</label>
    <textarea id="result" placeholder="结果将显示在这里…" readonly></textarea>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  const raw     = document.getElementById('raw');
  const result  = document.getElementById('result');
  const errorEl = document.getElementById('error');
  const copyBtn = document.getElementById('copyBtn');
  const encodeBtn = document.getElementById('encodeBtn');
  const decodeBtn = document.getElementById('decodeBtn');
  const stat    = document.getElementById('stat');

  let mode = 'encode'; // 'encode' | 'decode'

  function setMode(m) {
    mode = m;
    if (m === 'encode') {
      encodeBtn.classList.add('active');
      decodeBtn.classList.remove('active');
    } else {
      decodeBtn.classList.add('active');
      encodeBtn.classList.remove('active');
    }
    run();
  }

  // UTF-8 safe Base64 encode
  function utf8Encode(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  // UTF-8 safe Base64 decode
  function utf8Decode(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return new TextDecoder('utf-8').decode(bytes);
  }

  function run() {
    const text = raw.value;
    errorEl.textContent = '';
    result.value = '';
    stat.textContent = '';

    if (!text.trim()) return;

    try {
      if (mode === 'encode') {
        const encoded = utf8Encode(text);
        result.value = encoded;
        stat.textContent = text.length + ' 字符 → ' + encoded.length + ' 字符';
      } else {
        const decoded = utf8Decode(text.trim());
        result.value = decoded;
        stat.textContent = text.trim().length + ' 字符 → ' + decoded.length + ' 字符';
      }
    } catch (e) {
      errorEl.textContent = mode === 'decode'
        ? '解码失败：Base64 字符串格式不正确'
        : '编码失败：' + e.message;
      result.value = '';
    }
  }

  encodeBtn.addEventListener('click', () => setMode('encode'));
  decodeBtn.addEventListener('click', () => setMode('decode'));
  raw.addEventListener('input', run);

  copyBtn.addEventListener('click', () => {
    const text = result.value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 1500);
    });
  });
</script>
</body>
</html>
