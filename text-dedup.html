<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本去重工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    color: #d4d4d4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 24px;
  }
  .container { width: 100%; max-width: 720px; }
  h1 { font-size: 18px; font-weight: 500; color: #e0e0e0; margin-bottom: 16px; letter-spacing: 0.5px; }
  textarea {
    width: 100%; height: 420px;
    background: #252525; color: #c0c0c0;
    border: 1px solid #3a3a3a; border-radius: 6px;
    padding: 14px 16px;
    font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    font-size: 13px; line-height: 1.7;
    resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #5a5a5a; }
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px; flex-wrap: wrap;
  }
  button {
    background: #333; color: #ccc;
    border: 1px solid #444; border-radius: 5px;
    padding: 8px 18px;
    font-size: 13px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #3d3d3d; border-color: #555; }
  button:active { background: #2a2a2a; }
  button.primary { background: #3a6b5e; border-color: #4a8b7a; color: #e0e0e0; }
  button.primary:hover { background: #468070; }
  .count {
    font-size: 12px; color: #888;
    margin-left: 4px; white-space: nowrap;
  }
  .count strong { color: #b0b0b0; font-weight: 500; }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #3a6b5e; color: #e0e0e0;
    padding: 8px 22px; border-radius: 5px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .toast.show { opacity: 1; }
  .back-link { display: inline-block; color: #7a7a9a; text-decoration: none; font-size: 12px; margin-bottom: 10px; transition: color 0.15s; }
  .back-link:hover { color: #e0e0e0; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← 返回首页</a>
  <h1>文本去重</h1>
  <textarea id="input" placeholder="每行一条，粘贴到这里…"></textarea>
  <div class="toolbar">
    <button onclick="dedup()">去重</button>
    <button onclick="sortDedup()">排序</button>
    <button class="primary" onclick="copyAll()">一键复制</button>
    <span class="count" id="count"></span>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const input = document.getElementById('input');
const count = document.getElementById('count');
const toast = document.getElementById('toast');

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function getLines() {
  return input.value.split(/\r?\n/).filter(s => s.trim() !== '');
}

function updateCount(n) {
  count.innerHTML = '去重后剩余 <strong>' + n + '</strong> 条';
}

function dedup() {
  const lines = getLines();
  const seen = new Set();
  const unique = lines.filter(s => { const keep = !seen.has(s); seen.add(s); return keep; });
  input.value = unique.join('\n');
  updateCount(unique.length);
}

function sortDedup() {
  const seen = new Set();
  const unique = getLines().filter(s => { const keep = !seen.has(s); seen.add(s); return keep; });
  unique.sort((a, b) => a.localeCompare(b, 'zh'));
  input.value = unique.join('\n');
  updateCount(unique.length);
}

function copyAll() {
  const v = input.value.trim();
  if (!v) { showToast('没有内容可复制'); return; }
  navigator.clipboard.writeText(v).then(
    () => showToast('已复制 ' + v.split('\n').length + ' 条'),
    () => showToast('复制失败')
  );
}

// init count
updateCount(getLines().length);
input.addEventListener('input', () => updateCount(getLines().length));
</script>
</body>
</html>
