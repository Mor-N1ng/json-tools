<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开发者工具箱</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    min-height: 100vh;
    display: flex; justify-content: center;
    padding: 60px 24px;
  }
  .wrap { width: 100%; max-width: 780px; }
  header { text-align: center; margin-bottom: 48px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: 1px; }
  .sub { margin-top: 8px; font-size: 13px; color: #7a7a9a; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .card {
    background: #16213e;
    border: 1px solid #1f3058;
    border-radius: 10px;
    padding: 24px 20px 20px;
    display: flex; flex-direction: column;
    transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { border-color: #2d4575; transform: translateY(-1px); }
  .icon { font-size: 32px; margin-bottom: 12px; }
  .name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .desc { font-size: 12px; color: #8a8aaa; line-height: 1.5; margin-bottom: 18px; flex: 1; }
  .btn {
    display: block; text-align: center;
    background: #e94560; color: #fff;
    border: none; border-radius: 5px;
    padding: 8px 0; font-size: 13px;
    text-decoration: none; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #d13550; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>开发者工具箱</h1>
    <p class="sub">轻量、快速、免费</p>
  </header>
  <div class="grid">
    <div class="card">
      <div class="icon">{&nbsp;}</div>
      <div class="name">JSON 格式化</div>
      <div class="desc">一键美化、高亮、复制 JSON 数据</div>
      <a class="btn" href="json-formatter.html">进入</a>
    </div>
    <div class="card">
      <div class="icon">&#x1F4CB;</div>
      <div class="name">文本去重</div>
      <div class="desc">去除重复行，支持排序导出</div>
      <a class="btn" href="text-dedup.html">进入</a>
    </div>
  </div>
</div>
</body>
</html>
