<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 600;
    color: #f0f0f0;
    letter-spacing: 0.02em;
  }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  textarea {
    width: 100%;
    height: 200px;
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    color: #e0e0e0;
    font: inherit;
    font-size: 0.875rem;
    line-height: 1.6;
    padding: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: #4a6fa5;
  }

  textarea::placeholder {
    color: #555;
  }

  .output-wrap {
    position: relative;
  }

  pre {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 1rem 3rem 1rem 1rem;
    min-height: 200px;
    max-height: 500px;
    overflow: auto;
    font: inherit;
    font-size: 0.875rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: #2a2a4a;
    border: 1px solid #3a3a5a;
    color: #ccc;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.15s, color 0.15s;
  }

  .copy-btn:hover { background: #3a3a5a; color: #fff; }
  .copy-btn.copied { background: #2d5a27; border-color: #3a7a32; color: #8f8; }

  .error {
    background: #3a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: 6px;
    padding: 0.75rem 1rem;
    color: #ff8888;
    font-size: 0.8rem;
    white-space: pre-wrap;
  }

  .error:empty { display: none; }

  /* syntax tokens */
  .s-string  { color: #f8c555; }
  .s-number  { color: #a3d8f0; }
  .s-boolean { color: #ff9a8c; }
  .s-null    { color: #888; }
  .s-key     { color: #7ec8e3; }
  .s-bracket { color: #ccc; }
  .s-colon   { color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <h1>JSON Formatter</h1>

  <div class="panel">
    <label>Input — 粘贴 JSON 到下方</label>
    <textarea id="input" placeholder='{"hello":"world","nums":[1,2,3]}'></textarea>
  </div>

  <div class="panel">
    <div class="panel-header">
      <label>Output</label>
      <span id="stat"></span>
    </div>
    <div class="output-wrap">
      <pre id="output"></pre>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  const input   = document.getElementById('input');
  const output  = document.getElementById('output');
  const errorEl = document.getElementById('error');
  const copyBtn = document.getElementById('copyBtn');
  const stat    = document.getElementById('stat');

  function format() {
    const raw = input.value.trim();
    if (!raw) { output.textContent = ''; errorEl.textContent = ''; stat.textContent = ''; return; }

    let obj;
    try {
      obj = JSON.parse(raw);
    } catch (e) {
      errorEl.textContent = '解析错误: ' + e.message;
      output.textContent = '';
      stat.textContent = '';
      return;
    }

    errorEl.textContent = '';
    output.innerHTML = highlight(JSON.stringify(obj, null, 2));

    const bytes = new TextEncoder().encode(raw).length;
    stat.textContent = bytes < 1024
      ? bytes + ' B'
      : (bytes / 1024).toFixed(1) + ' KB';
  }

  function highlight(json) {
    const out = [];
    let i = 0;

    function esc(c) {
      return c === '&' ? '&amp;' : c === '<' ? '&lt;' : c === '>' ? '&gt;' : c;
    }

    function span(cls, s) {
      out.push(`<span class="${cls}">`, s, '</span>');
    }

    while (i < json.length) {
      const c = json[i];

      if (c === '"') {
        // read full string: find closing unescaped quote
        const start = i;
        i++;
        while (i < json.length) {
          if (json[i] === '\\') { i += 2; continue; }
          if (json[i] === '"') { i++; break; }
          i++;
        }
        const str = json.slice(start, i);

        // look ahead past whitespace to see if this is a key (followed by :)
        let j = i;
        while (j < json.length && (json[j] === ' ' || json[j] === '\n')) j++;
        if (json[j] === ':') {
          span('s-key', str);
        } else {
          span('s-string', str);
        }
        continue;
      }

      if (c === '{' || c === '}' || c === '[' || c === ']' || c === ',') {
        span('s-bracket', c);
        i++;
        continue;
      }

      if (c === ':') {
        span('s-colon', c);
        i++;
        continue;
      }

      if ((c >= '0' && c <= '9') || (c === '-' && json[i + 1] >= '0' && json[i + 1] <= '9')) {
        const start = i;
        i++;
        while (i < json.length && /[\d.eE+\-]/.test(json[i])) i++;
        span('s-number', json.slice(start, i));
        continue;
      }

      if (json.startsWith('true', i)) {
        span('s-boolean', 'true');
        i += 4;
        continue;
      }
      if (json.startsWith('false', i)) {
        span('s-boolean', 'false');
        i += 5;
        continue;
      }
      if (json.startsWith('null', i)) {
        span('s-null', 'null');
        i += 4;
        continue;
      }

      out.push(esc(c));
      i++;
    }

    return out.join('');
  }

  input.addEventListener('input', format);

  copyBtn.addEventListener('click', () => {
    const text = output.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 1500);
    });
  });

  // initial example
  input.value = '{"name":"demo","version":1,"tags":["json","formatter"],"active":true,"meta":null,"nested":{"key":"value"}}';
  format();
</script>
</body>
</html>
